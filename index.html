<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Fazenda Retro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Fazenda 1D</h1>

    <div class="painel">
        <h3>Status da Fazenda</h3>
        <p>Estação: <strong id="txt-estacao">Primavera</strong> (Turno: <span id="txt-turno">1</span>/10 para mudar)</p>
        <p>Clima: <strong id="txt-clima">Ensolarado</strong></p>
        <p>Estágio do Plantio: <strong id="txt-estagio">Preparado para Plantar</strong></p>
        <p>Insumo Aplicado nesta Safra: <strong id="txt-insumo">Nenhum</strong></p>

        <div class="campo-animacao" id="tela-campo">[....................]</div>

        <div class="botoes">
            <button onclick="passarTurno()">Avançar Tempo</button>
            <button id="btn-plantar" onclick="plantar()">Plantar (Trator)</button>
            <button id="btn-insumo" onclick="aplicarInsumo()">Aplicar Herbicida/Bio</button>
            <button id="btn-colher" onclick="colher()">Colher (Colheitadeira)</button>
        </div>

        <div class="logs" id="caixa-logs">
            - Jogo iniciado. Prepare a terra e plante!
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
