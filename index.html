<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda 1D - Simulação Agrícola Profissional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🚜 Simulador Agrícola Avançado</h1>
        <p class="description">Janela de aplicação: Biofertilizante e Herbicida <strong>SÓ</strong> funcionam na fase de crescimento!</p>
        
        <div class="status-panel">
            <div class="status-item">💰 Capital: $<span id="coins">40</span></div>
            <div class="status-item">🌾 Sementes: <span id="seeds">4</span></div>
            <div class="status-item" id="weather-display">☀️ Clima: Ensolarado</div>
        </div>

        <div class="tool-selector">
            <button id="tool-plow" class="tool-btn active">🚜 Arar Solo ($5)</button>
            <button id="tool-plant" class="tool-btn">🌱 Plantar</button>
            <button id="tool-bio" class="tool-btn-special">🧪 Biofertilizante ($8)</button>
            <button id="tool-herb" class="tool-btn-special">⚠️ Herbicida ($4)</button>
            <button id="tool-harvest" class="tool-btn">🌾 Colher Safra</button>
        </div>

        <div class="farm-zone">
            <div id="plot-0" class="plot-large">
                <div class="tractor-overlay"></div>
                <div class="plot-content">🟫 Terreno Bruto (Precisa Arar)</div>
                <div class="indicators"></div>
            </div>
            <div id="plot-1" class="plot-large">
                <div class="tractor-overlay"></div>
                <div class="plot-content">🟫 Terreno Bruto (Precisa Arar)</div>
                <div class="indicators"></div>
            </div>
        </div>

        <div class="shop-panel">
            <button id="btn-buy-seed">🛒 Comprar 1 Semente ($3)</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
